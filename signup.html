<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Faça seu cadastro - Lucasgram</title>
</head>
<body>
    <!-- AREA CONTAINER -->
    <div id="wrapper">

        <div id="container-signup">          
            <!-- AREA DOREITA -->
            <div class="column">
                <div class="login-panel">
                    <div class="logo">
                        <h1>Lucasgram</h1>
                    </div>

                    <div class="message">
                        <span>
                            Cadastre-se para ver fotos e vídeos dos seus amigos. 
                        </span>
                    </div>

                    <button class="cta-button">
                        Entrar com facebook
                    </button>

                    <div class="divisor-container">
                        <div class="line"></div>
                        <div class="divisor-tag">ou</div>
                        <div class="line"></div>
                    </div>

                    <form>
                        <input type="text" placeholder="Número de celular ou email" name="email">
                        <input type="text" placeholder="Nome completo" name="name">
                        <input type="text" placeholder="Username" name="username">
                        <input type="password" name="password" placeholder="Senha">
                        <input type="submit" value="Entrar">
                    </form>
                </div>

                <div class="infobox">
                    <p>Tem uma conta? <a href="index.html">Conecte-se</a></p>
                </div>

                <div class="get-app-panel">
                    Obtenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="img/appstore.png" alt="Baixe na appstore">
                        </a>
                        <a href="#">
                            <img src="img/googleplay.png" alt="">
                        </a>
                    </div>
                </div>
            </div>
            <!-- FIM AREA DIREITA -->

        </div>

    </div>
    <!-- FIM AREA CONTAINER -->

    <!-- RODAPE -->
     <footer>
        <div class="footer-inner">
            <a href="#">About us</a>
            <a href="#">Support</a>
            <a href="#">Blog</a>
            <a href="#">Press</a>
            <a href="#">API</a>
            <a href="#">Jobs</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Directory</a>
            <a href="#">Hashtags</a>
            <a href="#">Languages</a>
            <div class="text-small">@ 2022 Instagram</div>
        </div>
     </footer>
</body>
</html>
